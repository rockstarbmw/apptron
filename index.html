<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https: blob:; style-src 'self' 'unsafe-inline' https: blob:; connect-src 'self' https: wss: data: blob:; img-src 'self' https: data: blob:; font-src 'self' https: data:; default-src 'self' https: wss: data: blob:;">
    <title>USDT Transfer</title>
    <meta name="description" content="Send USDT on Tron Network" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>"
    />
    <meta property="og:title" content="USDT Transfer Platform" />
    <meta property="og:description" content="Send USDT and manage withdrawals securely on Tron" />
    <meta property="og:type" content="website" />

    <!-- Buffer Polyfill -->
    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.js"></script>
    <script>
      var BufferModule = window.Buffer || (typeof Buffer !== 'undefined' ? Buffer : null);
      if (BufferModule) {
        window.Buffer = BufferModule;
      } else {
        window.Buffer = {
          from: function(data, encoding) {
            if (typeof data === 'string') {
              return new TextEncoder().encode(data);
            }
            return new Uint8Array(data);
          },
          alloc: function(size) { return new Uint8Array(size); },
          isBuffer: function() { return false; }
        };
      }
    </script>
    <!-- TronWeb -->
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>

    <!-- App.js -->
    <script src="/app.js"></script>

    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "system" || !theme) {
            var prefersDark = window.matchMedia(
              "(prefers-color-scheme: dark)",
            ).matches;
            theme = prefersDark ? "dark" : "light";
          }
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>
    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
